name: MERN CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # Backend
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      # Start backend (in background)
      - name: Start Backend Server
        run: |
          cd backend
          npm start &
          sleep 10

      # Test API
      - name: Test API Endpoint
        run: |
          curl -X GET http://localhost:5000/ || exit 1

      # Frontend
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build