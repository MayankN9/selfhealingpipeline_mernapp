name: Self-Healing CI Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🟢 Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 🛑 Prevent infinite AI loop
      - name: Check if AI already fixed
        id: guard
        run: |
          LAST_MSG=$(git log -1 --pretty=%B)
          if echo "$LAST_MSG" | grep -q "\[ai-fix\]"; then
            echo "skip_fix=true" >> $GITHUB_OUTPUT
          else
            echo "skip_fix=false" >> $GITHUB_OUTPUT
          fi

      # 📦 Install backend dependencies
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      # 📦 Install frontend dependencies
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      # 🧪 Build frontend (capture logs)
      - name: Build Frontend
        id: build_step
        continue-on-error: true
        run: |
          cd frontend
          npm run build 2>&1 | tee build.log

      # 🛠 Install jq (for JSON parsing)
      - name: Install jq
        if: steps.build_step.outcome == 'failure'
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # 🤖 Generate patch using OpenAI (SAFE VERSION)
      - name: Generate Patch via AI
        if: steps.build_step.outcome == 'failure' && steps.guard.outputs.skip_fix == 'false'
        id: ai_patch
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "🔍 Generating patch from AI..."

          ERROR_LOG=$(tail -n 40 frontend/build.log)

          # Create prompt safely
          cat <<EOF > prompt.txt
You are a senior React engineer.
Fix the error below and return ONLY a unified diff patch.
Do not include explanations.

ERROR:
$ERROR_LOG
EOF

          # Build JSON safely using jq
          REQUEST_BODY=$(jq -n --arg prompt "$(cat prompt.txt)" '{
            model: "gpt-4.1-mini",
            messages: [{role: "user", content: $prompt}]
          }')

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$REQUEST_BODY")

          PATCH=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          echo "$PATCH" > fix.patch

          echo "📄 Patch preview:"
          head -n 20 fix.patch

      # 🔧 Apply patch
      - name: Apply Patch
        if: steps.build_step.outcome == 'failure' && steps.guard.outputs.skip_fix == 'false'
        run: |
          echo "🛠 Applying patch..."
          git apply --whitespace=fix fix.patch || {
            echo "❌ Patch failed"; exit 1;
          }

      # 🔁 Rebuild after fix
      - name: Rebuild After Fix
        if: steps.build_step.outcome == 'failure' && steps.guard.outputs.skip_fix == 'false'
        id: rebuild
        continue-on-error: true
        run: |
          cd frontend
          npm run build

      # 📤 Commit AI fix
      - name: Commit AI Fix
        if: steps.rebuild.outcome == 'success'
        run: |
          git config --global user.name "ai-bot"
          git config --global user.email "ai@bot.com"

          git add .
          git commit -m "[ai-fix] auto fix applied"
          git push