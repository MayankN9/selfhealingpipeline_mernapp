name: MERN CI Pipeline (Self-Healing v2)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Backend
      - name: Install Backend
        run: |
          cd backend
          npm install

      # Frontend
      - name: Install Frontend
        run: |
          cd frontend
          npm install

      # 🔥 Build with log capture
      - name: Build Frontend (Attempt 1)
        id: build_step
        continue-on-error: true
        run: |
          cd frontend
          npm run build 2>&1 | tee build.log

      # 🧠 Save logs if failed
      - name: Upload Logs
        if: steps.build_step.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: frontend/build.log

      # 🤖 AI Analysis (simulation)
      - name: Analyze Error (AI Simulation)
        if: steps.build_step.outcome == 'failure'
        run: |
          echo "Analyzing error..."
          cat frontend/build.log | tail -n 20

          echo "----- AI SUGGESTION -----"
          echo "Possible fixes:"
          echo "- Run npm install"
          echo "- Check syntax error"
          echo "- Missing dependency?"

      # 🔁 Retry
      - name: Retry Build (Attempt 2)
        if: steps.build_step.outcome == 'failure'
        run: |
          cd frontend
          npm install
          npm run build