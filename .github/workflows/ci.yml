name: Self-Healing CI Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Prevent infinite loop
      - name: Guard AI Loop
        id: guard
        run: |
          LAST_MSG=$(git log -1 --pretty=%B)
          if echo "$LAST_MSG" | grep -q "\[ai-fix\]"; then
            echo "skip_fix=true" >> $GITHUB_OUTPUT
          else
            echo "skip_fix=false" >> $GITHUB_OUTPUT
          fi

      # Install backend
      - name: Install Backend
        run: |
          cd backend
          npm install

      # Install frontend
      - name: Install Frontend
        run: |
          cd frontend
          npm install

      # Build frontend
      - name: Build Frontend
        id: build_step
        continue-on-error: true
        run: |
          cd frontend
          npm run build > build.log 2>&1

      # Show logs
      - name: Show Logs
        if: steps.build_step.outcome == 'failure'
        run: |
          echo "----- ERROR LOG -----"
          tail -n 40 frontend/build.log

      # Install jq
      - name: Install jq
        if: steps.build_step.outcome == 'failure'
        run: sudo apt-get update && sudo apt-get install -y jq

      # AI Fix (NO HEREDOC, NO YAML BREAK)
      - name: Generate Patch via AI
        if: steps.build_step.outcome == 'failure' && steps.guard.outputs.skip_fix == 'false'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ERROR_LOG=$(tail -n 40 frontend/build.log)

          # Create JSON safely using jq
          jq -n \
            --arg log "$ERROR_LOG" \
            '{
              model: "gpt-4.1-mini",
              messages: [
                {
                  role: "user",
                  content: ("Fix this React error and return ONLY a unified diff patch:\n\n" + $log)
                }
              ]
            }' > request.json

          curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @request.json > response.json

          jq -r '.choices[0].message.content' response.json > fix.patch

          echo "Patch Preview:"
          head -n 20 fix.patch

      # Apply patch
      - name: Apply Patch
        if: steps.build_step.outcome == 'failure' && steps.guard.outputs.skip_fix == 'false'
        run: |
          git apply fix.patch || {
            echo "Patch failed"
            exit 1
          }

      # Rebuild
      - name: Rebuild After Fix
        if: steps.build_step.outcome == 'failure' && steps.guard.outputs.skip_fix == 'false'
        id: rebuild
        continue-on-error: true
        run: |
          cd frontend
          npm run build

      # Commit fix
      - name: Commit Fix
        if: steps.rebuild.outcome == 'success'
        run: |
          git config --global user.name "ai-bot"
          git config --global user.email "ai@bot.com"

          git add .
          git commit -m "[ai-fix] automated fix"
          git push